name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. v1.0.0)"
        required: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${REF#v}"
          BUILD=$(date +%Y%m%d%H%M)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD=$BUILD"     >> $GITHUB_ENV
          echo "REF_NAME=$REF"    >> $GITHUB_ENV

      - name: Bump version in project
        run: |
          sed -i '' "s/MARKETING_VERSION = .*/MARKETING_VERSION = $VERSION;/" pomodof.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = .*/CURRENT_PROJECT_VERSION = $BUILD;/" pomodof.xcodeproj/project.pbxproj

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="build.keychain"
          KEYCHAIN_PASSWORD="actions"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -t 3600 "$KEYCHAIN"
          echo "$CERTIFICATE_P12" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm cert.p12

      - name: Build
        run: |
          xcodebuild \
            -project pomodof.xcodeproj \
            -scheme pomodof \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--options=runtime" \
            build

      - name: Package
        run: |
          APP="build/Build/Products/Release/pomodof.app"
          ditto -c -k --keepParent "$APP" Pomodof.zip
          hdiutil create -volname "Pomodof" -srcfolder "$APP" -ov -format UDZO Pomodof.dmg

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit Pomodof.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple
        run: |
          APP="build/Build/Products/Release/pomodof.app"
          xcrun stapler staple "$APP"
          # Re-package with stapled ticket
          rm Pomodof.zip Pomodof.dmg
          ditto -c -k --keepParent "$APP" Pomodof.zip
          hdiutil create -volname "Pomodof" -srcfolder "$APP" -ov -format UDZO Pomodof.dmg

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES=$(cat <<'NOTES'
          ## Install

          1. Download **Pomodof.dmg**, mount it and drag to Applications.
          2. Open Pomodof from Applications.

          Requires macOS 14 or later.
          NOTES
          )
          gh release create "$REF_NAME" \
            Pomodof.dmg \
            Pomodof.zip \
            --title "Pomodof $REF_NAME" \
            --notes "$NOTES"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain || true
